<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <label for="">Num1:</label>
    <input type="text" id="txt-num1">
    <label for="">Num2:</label>
    <input type="text" id="txt-num2">
    <label for="">total:</label>
    <input type="text" id="txt-total" readonly>
    <input type="button" value="+" id="btn-calculate" onclick="sum()">
    <input type="button" value="-" id="btn-calculate" onclick="minu()">
    <input type="button" value="*" id="btn-calculate" onclick="prod()">
    <input type="button" value="/" id="btn-calculate" onclick="div()">

    </br>
    <label for="">qty:</label>
    <input type="number" id="qty">
    <label for="">price:</label>
    <input type="number" id="price">
    <label for="">total:</label>
    <input type="number" id="total" readonly>

    </br>
    <label for="">Score:</label>
    <input type="number" id="score">
    <label for="">Result:</label>
    <input type="text" id="result" readonly>

    <script>

        var score = document.getElementById("score");
        var result = document.getElementById("result");

        score.addEventListener("keyup", function() {
            if (score.value >= 50) {
                result.value = "Pass";
            } else {
                result.value = "Fail";
            }
        });








        var qty = document.getElementById("qty");
        var price = document.getElementById("price");
        var total= document.getElementById("total");

        qty.addEventListener("keyup", function() {
            calculateTotal();
        });
        price.addEventListener("keyup", function() {
            calculateTotal();
        });
        
        function calculateTotal() {
            total.value = qty.value * price.value;
        }



    </script>

    <script src="calculator.js"></script>
</body>

</html>
